<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        h1 {
            color: #333;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .gallery img {
            width: 200px;
            height: 200px;
            border: 4px solid white;
            border-radius: 10px;
            transition: transform 0.4s, box-shadow 0.4s;
        }

        .gallery img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px black;
        }
    </style>

</head>
<body>

    <h1>My Image Gallery</h1>

    <div class="gallery">
        <img src="sbj 1.jpeg" alt="Image 1">
        <img src="sbj 2.jpeg" alt="Image 2">
        <img src="sbj 3.jpeg" alt="Image 3">
        <img src="sbj 4.jpeg" alt="Image 4">
    </div>

</body>
</html>
