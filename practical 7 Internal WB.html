<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #eef2f3;
        }

        /* Navbar */
        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* Container */
        .container {
            width: 70%;
            margin: auto;
        }

        /* Profile Box */
        .profile {
            background: white;
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 8px;
        }

        /* Sections */
        .section {
            background: white;
            margin-top: 15px;
            padding: 15px;
            border-left: 4px solid #3498db;
        }

        h1, h2 {
            color: #2c3e50;
        }

    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Education</a>
        <a href="#">Skills</a>
    </nav>

    <div class="container">

        <!-- Profile -->
        <div class="profile">
            <h1>Diggaj Turkar</h1>
            <p>Student | Web Learner</p>
        </div>

        <!-- About -->
        <div class="section">
            <h2>About Me</h2>
            <p>I am a student interested in web development and learning new technologies.</p>
        </div>

        <!-- Education -->
        <div class="section">
            <h2>Education</h2>
            <p>B.tech First Year - SB Jain Collage</p>
        </div>

        <!-- Skills -->
        <div class="section">
            <h2>Skills</h2>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>Basic JavaScript</li>
            </ul>
        </div>

    </div>

</body>
</html>
