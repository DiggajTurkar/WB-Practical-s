<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive CSS3 Page</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f4f4f4;
}

/* Header */
header {
    background: #333;
    color: white;
    text-align: center;
    padding: 20px;
}

/* Navigation */
nav {
    display: flex;
    justify-content: center;
    background: #555;
}
nav a {
    color: white;
    padding: 14px 20px;
    text-decoration: none;
}
nav a:hover {
    background: #000;
}

/* Grid Layout */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Cards */
.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    transition: transform 0.5s;
}

/* Transformation */
.card:hover {
    transform: scale(1.05) rotate(2deg);
}

/* Icons */
.card i {
    font-size: 40px;
    color: #007BFF;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

.card {
    animation: fadeIn 1s ease-in;
}

/* Footer */
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
}

/* Responsive */
@media(max-width: 600px) {
    nav {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<header>
    <h1>Responsive Webpage</h1>
    <p>Using CSS3 Features</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="card">
        <i class="fas fa-laptop"></i>
        <h3>Web Design</h3>
        <p>Modern responsive designs.</p>
    </div>

    <div class="card">
        <i class="fas fa-mobile-alt"></i>
        <h3>Mobile Friendly</h3>
        <p>Optimized for all devices.</p>
    </div>

    <div class="card">
        <i class="fas fa-rocket"></i>
        <h3>Fast Performance</h3>
        <p>High speed and efficiency.</p>
    </div>
</div>

<footer>
    <p>© 2026 Responsive Page</p>
</footer>

</body>
</html>
